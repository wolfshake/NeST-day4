<div class="card w-100 m-5" style="width: 22rem !important; height: 800px; margin: 10px;">
  <img src="{{ product.image }}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{ product.title }}</h5>
    <p class="card-text flex-grow-1">{{ product.description }}</p>
    <p class="card-text">at just ${{ product.price }}rs</p>
    <a routerLink="contact" class="btn btn-primary">Grab Now</a>
  </div>
</div>
